<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Viewer - 3D Character</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

    <style>
        /* === 延續首頁的網點手帳背景 === */
        body {
            background-color: #FDFBF7; 
            background-image: radial-gradient(#D1D5DB 1.5px, transparent 1.5px); 
            background-size: 25px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* === 返回按鈕（退出鍵） === */
        .back-btn {
            align-self: flex-start; /* 靠左對齊 */
            margin-bottom: 30px;
            max-width: 800px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #E67E22;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .back-btn:hover {
            color: #D35400;
            transform: translateX(-5px); /* 滑鼠移過時稍微往左移，暗示返回 */
        }

        /* === 拍立得相片卡片風格 === */
        .photo-card {
            background: #FFFFFF;
            padding: 15px 15px 40px 15px; /* 下方留白多一點，像拍立得 */
            border-radius: 3px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        /* 卡片上方的半透明紙膠帶 */
        .photo-card::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            margin-left: -60px;
            width: 120px;
            height: 25px;
            background-color: rgba(52, 152, 219, 0.4); /* 藍色紙膠帶 */
            transform: rotate(-2deg);
            z-index: 10;
        }

        /* 限制 Babylon 視窗的大小與外觀 */
        babylon {
            width: 100%;
            height: 500px;
            border-radius: 2px;
            /* 加上內陰影讓模型看起來像嵌在卡片裡 */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
        }

        /* 相片下方的照片說明 */
        .caption {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: #2C3E50;
            text-align: center;
            margin-top: 15px;
            transform: rotate(-1deg);
        }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 800px;">
        <a href="index.html" class="back-btn">← Back to Index</a>
    </div>

    <div class="photo-card">
        
        <babylon model="./models/hw2_test3.glb"></babylon>
        
        <div class="caption">Boy Character Design</div>
    </div>

</body>
</html>
