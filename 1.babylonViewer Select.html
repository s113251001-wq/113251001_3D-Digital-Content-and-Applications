<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Viewer - Select Model</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* === 延續首頁的網點手帳背景 === */
        body {
            background-color: #FDFBF7;
            background-image: radial-gradient(#D1D5DB 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Noto Sans TC', sans-serif;
            box-sizing: border-box;
        }

        /* === 返回按鈕 === */
        .back-btn {
            align-self: flex-start;
            max-width: 800px;
            width: 100%;
            margin: 0 auto 20px auto;
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #E67E22;
            text-decoration: none;
            transition: transform 0.2s;
            display: inline-block;
        }

        .back-btn:hover {
            color: #D35400;
            transform: translateX(-5px);
        }

        /* === 整合選單與視窗的白色展示卡片 === */
        .ui-container {
            background: #FFFFFF;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 標題 */
        h2 {
            margin: 0;
            color: #2C3E50;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* === 美化下拉選單 === */
        .custom-select {
            padding: 12px 20px;
            font-size: 1.1rem;
            color: #34495E;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            outline: none;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            background-color: #F9FAFB;
            transition: all 0.3s ease;
        }

        /* 滑鼠移過或點擊選單時變色 */
        .custom-select:focus, .custom-select:hover {
            border-color: #3498DB;
            background-color: #FFFFFF;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }

        /* === 3D 視窗容器 === */
        .viewerContainer {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05); /* 內陰影讓畫面有點深度 */
        }

        babylon {
            width: 100%;
            height: 100%;
        }
    </style>

    <script>
        // 這是老師原本的切換模型程式碼，保留不動
        function loadit(modelUrl) {
            if(modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>
<body>

    <div style="width: 100%; max-width: 800px;">
        <a href="index.html" class="back-btn">← Back to Index</a>
    </div>
    
    <div class="ui-container">
        <h2>★ 選擇你要預覽的作品 ★</h2>
        
        <select class="custom-select" onchange="loadit(this.value)">
            <option value="">-- 請選擇 3D 模型 --</option>
            <option value="./models/hw2_test3.glb">Kenney</option>
            <option value="./models/113251001.glb">Girl</option>
            <option value="./models/stacy_lightweight.glb">Stacy</option>
        </select>

        <div class="viewerContainer">
            <babylon id="viewerID"></babylon>
        </div>
    </div>

</body>
</html>
