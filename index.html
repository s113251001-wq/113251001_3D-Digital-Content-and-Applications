<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model News</title>
    
    <!-- 引入 Google 手寫字體 (Caveat) 讓文字看起來像用筆寫的 -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">

    <style>
        /* 設定整個網頁的背景 */
        body {
            /* 這裡呼叫你剛剛存好的背景圖片 bg.jpg */
            background-image: url('bg.jpg'); 
            background-size: 100% 100%;   /* 讓圖片填滿且不裁切邊框 */
            background-position: center;  
            background-repeat: no-repeat; 
            height: 100vh;                
            margin: 0;
            display: flex;
            justify-content: center;      
            align-items: center;          
        }

        /* 隱形的區塊，用來對齊白紙的位置 */
        .paper-area {
            width: 450px;       
            height: 320px;      
            margin-top: 100px;  /* 依據你的螢幕微調上下位置 */
            margin-left: 20px;  /* 依據你的螢幕微調左右位置 */
            padding: 10px;
            display: flex;
            flex-direction: column; /* 讓按鈕垂直排列 */
            align-items: center;    /* 按鈕置中 */
            gap: 20px;              /* 按鈕之間的間距 */
            overflow-y: auto;   
        }

        /* === 華麗變身：把超連結變成剪貼紙條 === */
        .paper-area a {
            display: inline-block;
            font-family: 'Caveat', cursive, sans-serif; /* 使用手寫字體 */
            font-size: 28px;
            color: #333333;             /* 深灰色文字，像麥克筆 */
            text-decoration: none;      /* 移除醜醜的底線 */
            background-color: rgba(255, 253, 240, 0.9); /* 微黃的紙張底色 */
            padding: 8px 30px;
            border-radius: 5px;         /* 稍微圓角 */
            border: 2px dashed #b2bec3; /* 虛線邊框，像撕下來的紙 */
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3); /* 加上陰影產生立體感 */
            
            /* 讓按鈕有隨機傾斜的感覺 */
            transform: rotate(-2deg);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); /* 動畫漸變設定 */
        }

        /* 讓偶數的按鈕往另一個方向傾斜，看起來更自然 */
        .paper-area a:nth-child(even) {
            transform: rotate(2deg);
        }

        /* === 滑鼠滑過時的特效 === */
        .paper-area a:hover {
            color: #d35400;             /* 字體變成亮橘色 */
            background-color: #ffeaa7;  /* 背景變成螢光黃色 */
            border-color: #d35400;      
            transform: scale(1.1) rotate(0deg); /* 放大並轉正 */
            box-shadow: 4px 8px 15px rgba(0,0,0,0.4); /* 陰影加深，產生浮起來的效果 */
            z-index: 10;
        }

        /* 美化卷軸（如果按鈕太多需要滾動的話） */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2); 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- 放在白紙區域上的連結按鈕 -->
    <div class="paper-area">
        <a href="sketchfab.html">★ SketchFab Example</a>
        <a href="0.babylonViewer Basic.html">★ Babylon Viewer Basic</a>
        <a href="1.babylonViewer Select.html">★ Babylon Viewer Select</a>
        <a href="2.babylonViewer Navbar.html">★ Babylon Viewer Navbar</a>
    </div>

</body>
</html>
