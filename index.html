<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Models Showcase</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* === 現代極簡風格設定 === */
        :root {
            --primary-color: #4F46E5; /* 科技感的靛藍色 */
            --bg-color: #F9FAFB;      /* 非常淡的灰白色背景 */
            --card-bg: #FFFFFF;       /* 純白卡片 */
            --text-main: #111827;     /* 深灰色主文字 */
            --text-muted: #6B7280;    /* 淺灰色副文字 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            
            /* 加上非常微弱的網格背景，增加一點點科技感細節 */
            background-image: radial-gradient(#E5E7EB 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* === 網頁頭部區域 === */
        header {
            margin-top: 10vh;
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        /* 讓標題有一點漸層點綴 */
        h1 span {
            background: linear-gradient(to right, #4F46E5, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin: 0;
        }

        /* === 導覽選單區域 === */
        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* === 現代化卡片按鈕 === */
        .nav-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 24px 32px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.25rem;
            border: 2px solid transparent;
            
            /* 柔和的網頁陰影 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 卡片 Hover 互動效果 */
        .nav-card:hover {
            transform: translateY(-4px); /* 輕微上浮 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); /* 陰影放大 */
            border-color: var(--primary-color); /* 邊框亮起 */
            color: var(--primary-color);
        }

        /* 按鈕右側的箭頭動畫 */
        .nav-card::after {
            content: '→';
            font-size: 1.5rem;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.3s ease;
        }

        .nav-card:hover::after {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <header>
        <h1>My <span>3D Models</span></h1>
        <p class="subtitle">Digital Content & Applications Showcase</p>
    </header>

    <div class="nav-container">
        <a href="sketchfab.html" class="nav-card">SketchFab Example</a>
        <a href="0.babylonViewer Basic.html" class="nav-card">Babylon Viewer Basic</a>
        <a href="1.babylonViewer Select.html" class="nav-card">Babylon Viewer Select</a>
        <a href="2.babylonViewer Navbar.html" class="nav-card">Babylon Viewer Navbar</a>
    </div>

</body>
</html>
