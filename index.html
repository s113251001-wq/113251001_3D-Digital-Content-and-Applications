<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model News</title>
    <style>
        /* 設定整個網頁的背景 */
        body {
            /* 這裡呼叫你剛剛存好的背景圖片 bg.jpg */
            background-image: url('bg.jpg'); 
            background-size: cover;       /* 讓圖片依比例放大填滿畫面 */
            background-position: center;  /* 讓圖片保持在正中間 */
            background-repeat: no-repeat; /* 背景不重複拼貼 */
            height: 100vh;                /* 讓網頁高度等於螢幕高度 */
            margin: 0;
            display: flex;
            justify-content: center;      /* 水平置中內容 */
            align-items: center;          /* 垂直置中內容 */
            font-family: Arial, sans-serif;
        }

        /* 建立一個隱形的區塊，對齊在背景圖片的「白紙」上 */
        .paper-area {
            width: 400px;       /* 限制文字區塊的寬度 */
            height: 280px;      /* 限制文字區塊的高度 */
            margin-top: 80px;   /* 將區塊往下推，避開上方的 3D MODEL 標題 */
            margin-left: 0px;   /* 依需求可微調左右位置 */
            padding: 10px;
            overflow-y: auto;   /* 如果內容太多，會在紙張範圍內出現卷軸 */
            text-align: left;   /* 文字靠左對齊 */
        }

        /* 設定紙張上面的超連結文字樣式（模仿圖片中的藍色底線文字） */
        .paper-area a {
            display: block;          /* 讓每個連結獨立佔一行 */
            font-size: 24px;         /* 字體大小 */
            color: #0000EE;          /* 經典的超連結藍色 */
            text-decoration: underline; /* 加上底線 */
            margin-bottom: 30px;     /* 每個選項之間的垂直距離 */
            letter-spacing: 1px;     /* 字元間距稍微拉開 */
        }

        /* 滑鼠游標移過去時，顏色變深 */
        .paper-area a:hover {
            color: #000080;
        }

        /* 美化卷軸（模仿圖片中細細的灰色卷軸） */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: #cccccc; 
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="paper-area">
        <a href="sketchfab.html">SketchFab Example</a>
        <a href="0.babylonViewer Basic.html">Babylon Viewer Basic</a>
        <a href="1.babylonViewer Select.html">Babylon Viewer Select</a>
        <a href="2.babylonViewer Navbar.html">Babylon Viewer Navbar</a>
    </div>

</body>
</html>
