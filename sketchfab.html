<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchfab Viewer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* === 延續首頁的網點手帳背景 === */
        body {
            background-color: #FDFBF7;
            background-image: radial-gradient(#D1D5DB 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Noto Sans TC', sans-serif;
            box-sizing: border-box;
        }

        /* === 退出/返回按鈕 === */
        .back-btn {
            align-self: flex-start;
            max-width: 900px;
            width: 100%;
            margin: 0 auto 20px auto;
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #E67E22;
            text-decoration: none;
            transition: transform 0.2s;
            display: inline-block;
        }

        .back-btn:hover {
            color: #D35400;
            transform: translateX(-5px);
        }

        /* === 展示卡片區塊 === */
        .workspace-card {
            background: #FFFFFF;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 標題與說明 */
        .header-group {
            text-align: center;
            border-bottom: 2px dashed #F0F0F0;
            padding-bottom: 15px;
        }

        h2 {
            margin: 0;
            color: #2C3E50;
            font-size: 1.8rem;
        }

        /* === 強制設定 Sketchfab iframe 的寬高，讓它填滿卡片 === */
        .sketchfab-embed-wrapper iframe {
            width: 100%;
            height: 550px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 將 Sketchfab 提供的文字說明置中 */
        .sketchfab-embed-wrapper p {
            text-align: center;
            margin-top: 15px !important;
        }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 900px;">
        <a href="index.html" class="back-btn">← Back to Index</a>
    </div>
    
    <div class="workspace-card">
        
        <div class="header-group">
            <h2>★ Sketchfab Showcase ★</h2>
        </div>
        
        <div class="sketchfab-embed-wrapper"> 
            <iframe title="HW1_113251001" frameborder="0" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share src="https://sketchfab.com/models/75a337b192ac4db78a36330e8f484bc4/embed"> </iframe> 
            <p style="font-size: 14px; font-weight: normal; margin: 5px; color: #4A4A4A;"> 
                <a href="https://sketchfab.com/3d-models/hw1-113251001-75a337b192ac4db78a36330e8f484bc4?utm_medium=embed&utm_campaign=share-popup&utm_content=75a337b192ac4db78a36330e8f484bc4" target="_blank" rel="nofollow" style="font-weight: bold; color: #1CAAD9;"> HW1_113251001 </a> by <a href="https://sketchfab.com/Ivy94113?utm_medium=embed&utm_campaign=share-popup&utm_content=75a337b192ac4db78a36330e8f484bc4" target="_blank" rel="nofollow" style="font-weight: bold; color: #1CAAD9;"> Ivy94113 </a> on <a href="https://sketchfab.com?utm_medium=embed&utm_campaign=share-popup&utm_content=75a337b192ac4db78a36330e8f484bc4" target="_blank" rel="nofollow" style="font-weight: bold; color: #1CAAD9;">Sketchfab</a>
            </p>
        </div>
        
    </div>

</body>
</html>
